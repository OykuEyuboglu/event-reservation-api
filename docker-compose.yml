version: "3.9"

services:

  postgres:
    image: postgres:17
    container_name: postgres
    restart: always

    environment:
      POSTGRES_DB: reservationdb
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password

    ports:
      - "5432:5432"

    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:latest
    container_name: redis
    restart: always

    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    restart: always

    ports:
      - "5672:5672"
      - "15672:15672"

volumes:
  postgres-data: